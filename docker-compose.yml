version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: st3plearn-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: st3plearn
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: st3plearn-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: quangtrung54677@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: st3plearn-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secretpassword
  redis:
    image: redis:7-alpine
    container_name: edtech-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres-data:
    driver: local